name: Specification proposal
description: Propose a normative semantic or compatibility change.
title: "spec: "
labels: [specification]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the interoperability problem without customer data.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed contract
      description: Include alternatives and why the current schema is insufficient.
    validations:
      required: true
  - type: dropdown
    id: compatibility
    attributes:
      label: Compatibility impact
      options:
        - Editorial only
        - Backward-compatible
        - Validation tightening
        - Breaking
    validations:
      required: true
  - type: textarea
    id: migration
    attributes:
      label: Migration and conformance plan
      description: Identify fixtures, implementation work, and migration guidance.
    validations:
      required: true
