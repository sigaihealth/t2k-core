name: DCO

on:
  pull_request:

permissions:
  contents: read

jobs:
  signoff:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: node scripts/dco-check.mjs "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
