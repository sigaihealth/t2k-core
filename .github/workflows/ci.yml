name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: t2k_reference_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        options: >-
          --health-cmd "pg_isready -U postgres -d t2k_reference_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
        ports:
          - 5432:5432
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run check:postgres
        env:
          T2K_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/t2k_reference_test
